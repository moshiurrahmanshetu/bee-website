<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honey & Hive | Contact</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <header class="glass-header">
        <nav class="container nav-container">
            <div class="logo">H<span class="text-gradient">IVE</span></div>
            <ul class="nav-links">
                <li><a href="index.html" class="nav-transition">Home</a></li>
                <li><a href="about.html" class="nav-transition">About</a></li>
                <li><a href="products.html" class="nav-transition">Products</a></li>
                <li><a href="features.html" class="nav-transition">Features</a></li>
                <li><a href="gallery.html" class="nav-transition">Gallery</a></li>
                <li><a href="contact.html" class="nav-transition active">Contact</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="scroll-section">
            <div class="container center-text">
                <h2 class="section-title">Get in <span class="text-gradient">Touch</span></h2>
                <div class="contact-wrapper glass-panel">
                    <form onsubmit="event.preventDefault();">
                        <div class="input-group">
                            <input type="text" placeholder="Your Name" required>
                        </div>
                        <div class="input-group">
                            <input type="email" placeholder="Your Email" required>
                        </div>
                        <div class="input-group">
                            <textarea rows="4" placeholder="Your Message" required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Send Message</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <footer class="glass-footer">
        <div class="container">
            <div class="logo">H<span class="text-gradient">IVE</span></div>
            <p>&copy; 2026 Honey & Hive. All rights reserved.</p>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>window.IS_HOME_PAGE = false;</script>
    <script src="script.js"></script>
    <script src="page-transition.js"></script>
</body>
</html>
